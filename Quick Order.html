<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנה מהירה - SAP B2B</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sap-blue: #0054a6;
            --sap-light: #f4f7fa;
            --white: #ffffff;
            --border: #d1d5db;
            --row-hover: #f9fafb;
        }

        body { margin: 0; font-family: 'Assistant', sans-serif; background-color: var(--sap-light); }

        /* שורת ניווט */
        .sap-nav {
            background: var(--sap-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; font-size: 14px; }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--sap-blue);
            padding-bottom: 15px;
        }

        .order-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .order-table th { text-align: right; padding: 12px; background: #f8f9fa; border-bottom: 2px solid var(--border); color: var(--sap-blue); }
        .order-table td { padding: 10px; border-bottom: 1px solid #eee; }

        .input-item-code { width: 90%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; font-family: monospace; }
        .input-qty { width: 70px; padding: 10px; border: 1px solid var(--border); border-radius: 5px; text-align: center; }

        .btn { padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-add-row { background: #e5e7eb; color: #374151; margin-bottom: 20px; }
        .btn-submit { background: var(--sap-blue); color: white; float: left; }
        .remove-btn { color: #d93025; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="sap-nav">
        <div class="nav-logo" style="font-weight: bold;">SAP Business Portal</div>
        <ul class="nav-links">
            <li><a href="Product Catalog.html">קטלוג</a></li>
            <li><a href="Quick Order.html" style="border-bottom: 2px solid white;">הזמנה מהירה</a></li>
            <li><a href="Cart.html">סל קניות</a></li>
            <li><a href="Order History.html">היסטוריה</a></li>
            <li><a href="login.html" style="color: #ffb3b3;">יציאה</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-bolt"></i> הזמנה מהירה</h1>
            <span id="clientLabel" style="font-weight: bold; color: var(--sap-blue);">טוען נתוני לקוח...</span>
        </div>

        <p style="color: #666;">הזן מק"ט וכמות. המערכת תבצע אימות מול מלאי ה-SAP בזמן אמת.</p>

        <table class="order-table" id="quickOrderTable">
            <thead>
                <tr>
                    <th>מק״ט (Item Code)</th>
                    <th>שם פריט</th>
                    <th>כמות</th>
                    <th>מחיר</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>

        <button class="btn btn-add-row" onclick="addRow()">
            <i class="fas fa-plus"></i> הוסף שורה
        </button>

        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
            <button class="btn btn-submit" onclick="addAllToCart()">
                הוסף הכל לסל הקניות <i class="fas fa-shopping-cart"></i>
            </button>
            <div style="clear:both;"></div>
        </div>
    </div>

    <script>
        const PROXY_URL = "https://your-proxy.onrender.com/api";

        function addRow() {
            const tbody = document.getElementById('tableBody');
            const tr = document.createElement('tr');
            tr.className = "order-row";
            tr.innerHTML = `
                <td><input type="text" class="input-item-code" placeholder="מק״ט..." onblur="lookupItem(this)"></td>
                <td class="item-name">---</td>
                <td><input type="number" class="input-qty" value="1" min="1"></td>
                <td class="item-price">₪0.00</td>
                <td><i class="fas fa-trash remove-btn" onclick="this.closest('tr').remove()"></i></td>
            `;
            tbody.appendChild(tr);
        }

        async function lookupItem(input) {
            const itemCode = input.value.trim();
            if (!itemCode) return;

            const row = input.closest('tr');
            const nameCell = row.querySelector('.item-name');
            const priceCell = row.querySelector('.item-price');

            nameCell.innerText = "מחפש...";

            try {
                // קריאה לפרוקסי שמחזיר נתוני פריט בודד
                const response = await fetch(`${PROXY_URL}/products/${itemCode}`);
                if (!response.ok) throw new Error();
                
                const item = await response.json();
                nameCell.innerText = item.ItemName;
                nameCell.style.color = "#107c10";
                priceCell.innerText = "₪" + parseFloat(item.Price).toLocaleString();
                
                // שמירת נתונים ב-Dataset של השורה לצורך הוספה לסל
                row.dataset.itemData = JSON.stringify({
                    code: item.ItemCode,
                    name: item.ItemName,
                    price: item.Price
                });
            } catch (e) {
                nameCell.innerText = "לא נמצא בסאפ";
                nameCell.style.color = "red";
            }
        }

        function addAllToCart() {
            let cart = JSON.parse(localStorage.getItem('sap_cart')) || [];
            const rows = document.querySelectorAll('.order-row');
            let addedCount = 0;

            rows.forEach(row => {
                if (row.dataset.itemData) {
                    const item = JSON.parse(row.dataset.itemData);
                    const qty = parseInt(row.querySelector('.input-qty').value);
                    
                    const existing = cart.find(c => c.code === item.code);
                    if (existing) {
                        existing.qty += qty;
                    } else {
                        cart.push({ ...item, qty });
                    }
                    addedCount++;
                }
            });

            if (addedCount > 0) {
                localStorage.setItem('sap_cart', JSON.stringify(cart));
                alert(`${addedCount} פריטים נוספו לסל בהצלחה!`);
                window.location.href = "Cart.html";
            } else {
                alert("אנא הזן מק״טים תקינים לפני ההוספה.");
            }
        }

        window.onload = () => {
            const user = sessionStorage.getItem('loggedClientName') || "לקוח כללי";
            document.getElementById('clientLabel').innerText = "מחובר בתור: " + user;
            addRow(); // התחל עם שורה אחת ריקה
        };
    </script>
</body>
</html>
