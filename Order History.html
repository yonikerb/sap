<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>היסטוריית הזמנות - SAP B2B</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sap-blue: #0054a6;
            --sap-light: #f4f7fa;
            --white: #ffffff;
            --border: #e2e8f0;
            --status-open: #f39c12;
            --status-closed: #107c10;
        }

        body { margin: 0; font-family: 'Assistant', sans-serif; background-color: var(--sap-light); }

        /* שורת ניווט */
        .sap-nav {
            background: var(--sap-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; font-size: 14px; }
        .nav-logo { font-weight: bold; font-size: 18px; }

        .history-container {
            max-width: 1200px;
            margin: 40px auto;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--sap-light);
            padding-bottom: 15px;
        }

        .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .history-table th { text-align: right; padding: 15px; background: #f8f9fa; color: #718096; border-bottom: 2px solid var(--border); }
        .history-table td { padding: 15px; border-bottom: 1px solid var(--border); }

        .status-badge { padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        .status-open { background: #fff4e5; color: var(--status-open); }
        .status-closed { background: #e6ffed; color: var(--status-closed); }

        .loading-msg { text-align: center; padding: 40px; color: var(--sap-blue); }
    </style>
</head>
<body>

    <nav class="sap-nav">
        <div class="nav-logo">SAP Business Portal</div>
        <ul class="nav-links">
            <li><a href="Product Catalog.html">קטלוג</a></li>
            <li><a href="Quick Order.html">הזמנה מהירה</a></li>
            <li><a href="Cart.html">סל קניות</a></li>
            <li><a href="Order History.html" style="border-bottom: 2px solid white;">היסטוריה</a></li>
            <li><a href="Account Info.html">מצב חשבון</a></li>
            <li><a href="login.html" style="color: #ffb3b3;">יציאה</a></li>
        </ul>
    </nav>

    <div class="history-container">
        <div class="header-section">
            <h2><i class="fas fa-history"></i> היסטוריית הזמנות</h2>
            <div id="orderCount" style="font-size: 14px; color: #718096;">טוען נתונים...</div>
        </div>

        <div id="loading" class="loading-msg">
            <i class="fas fa-spinner fa-spin"></i> מושך הזמנות משרת ה-SAP...
        </div>

        <table class="history-table" id="ordersTable" style="display: none;">
            <thead>
                <tr>
                    <th>מספר הזמנה</th>
                    <th>תאריך</th>
                    <th>סטטוס</th>
                    <th>סה"כ (₪)</th>
                    <th>פעולות</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                </tbody>
        </table>
    </div>

    <script>
        async function loadOrders() {
            const cardCode = sessionStorage.getItem('loggedClientCode') || 'C1000';
            const PROXY_URL = `https://your-proxy.onrender.com/api/orders/${cardCode}`;

            try {
                const response = await fetch(PROXY_URL);
                const orders = await response.json();

                const body = document.getElementById('ordersBody');
                body.innerHTML = '';

                orders.forEach(order => {
                    const statusClass = order.DocumentStatus === 'bO' ? 'status-open' : 'status-closed';
                    const statusText = order.DocumentStatus === 'bO' ? 'בטיפול (Open)' : 'סגור/סופק (Closed)';
                    
                    body.innerHTML += `
                        <tr>
                            <td><b>${order.DocNum}</b></td>
                            <td>${new Date(order.DocDate).toLocaleDateString('he-IL')}</td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td>₪${order.DocTotal.toLocaleString()}</td>
                            <td><button onclick="viewOrder(${order.DocEntry})" style="border:none; background:none; color:#0054a6; cursor:pointer; font-weight:bold;">פרטים</button></td>
                        </tr>
                    `;
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('ordersTable').style.display = 'table';
                document.getElementById('orderCount').innerText = `מציג ${orders.length} הזמנות אחרונות`;

            } catch (error) {
                document.getElementById('loading').innerText = 'שגיאה בטעינת נתונים';
                console.error(error);
            }
        }

        function viewOrder(docEntry) {
            // כאן אפשר להוסיף פופ-אפ שמציג את השורות של ההזמנה הספציפית
            alert("מציג פרטים עבור הזמנה פנימית: " + docEntry);
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
