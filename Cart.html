<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סל קניות - סיכום הזמנה</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sap-blue: #0054a6;
            --sap-light: #f4f7fa;
            --white: #ffffff;
            --border: #e2e8f0;
            --accent-gold: #f39c12;
            --danger: #e74c3c;
        }

        body {
            margin: 0;
            font-family: 'Assistant', sans-serif;
            background-color: var(--sap-light);
            padding: 40px 5%;
        }

        .cart-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        /* רשימת המוצרים בסל */
        .cart-items-section {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { color: var(--sap-blue); margin-top: 0; border-bottom: 2px solid var(--sap-light); padding-bottom: 15px; }

        .cart-table { width: 100%; border-collapse: collapse; }
        .cart-table th { text-align: right; color: #718096; font-size: 14px; padding: 10px; border-bottom: 1px solid var(--border); }
        .cart-item { border-bottom: 1px solid var(--border); }
        .cart-item:last-child { border-bottom: none; }
        
        .cart-item td { padding: 20px 10px; vertical-align: middle; }

        .prod-info { display: flex; align-items: center; gap: 15px; }
        .prod-img { width: 60px; height: 60px; background: #f8f9fa; border-radius: 8px; display: flex; justify-content: center; align-items: center; }
        .prod-details b { display: block; color: var(--sap-blue); }
        .prod-details span { font-size: 12px; color: #a0aec0; }

        .qty-control { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 6px; width: fit-content; }
        .qty-btn { background: none; border: none; padding: 5px 12px; cursor: pointer; font-size: 18px; color: var(--sap-blue); }
        .qty-input { width: 40px; border: none; text-align: center; font-weight: bold; font-size: 16px; }

        .price-col { font-weight: bold; font-size: 16px; }
        .remove-icon { color: var(--danger); cursor: pointer; transition: 0.2s; }
        .remove-icon:hover { transform: scale(1.2); }

        /* סיכום הזמנה */
        .order-summary {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
            position: sticky;
            top: 40px;
        }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 16px; }
        .summary-total { border-top: 2px solid var(--sap-light); padding-top: 15px; margin-top: 15px; font-weight: bold; font-size: 20px; color: var(--sap-blue); }

        .checkout-btn {
            width: 100%;
            background: var(--sap-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .checkout-btn:hover { background: var(--sap-dark); }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #718096; text-decoration: none; font-size: 14px; }

        @media (max-width: 900px) {
            .cart-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="cart-container">
        
        <div class="cart-items-section">
            <h2><i class="fas fa-shopping-basket"></i> סל הקניות שלי</h2>
            
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>מוצר</th>
                        <th>כמות</th>
                        <th>מחיר יחידה</th>
                        <th>סה״כ</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cartItems">
                    <tr class="cart-item">
                        <td class="prod-info">
                            <div class="prod-img"><i class="fas fa-box" style="color:#cbd5e0"></i></div>
                            <div class="prod-details">
                                <b>מקדחה מקצועית 18V</b>
                                <span>מק״ט: ITEM-7762</span>
                            </div>
                        </td>
                        <td>
                            <div class="qty-control">
                                <button class="qty-btn" onclick="updateQty(this, -1)">-</button>
                                <input type="text" class="qty-input" value="2" readonly>
                                <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
                            </div>
                        </td>
                        <td class="price-col">₪450.00</td>
                        <td class="price-col">₪900.00</td>
                        <td><i class="fas fa-trash-alt remove-icon"></i></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="order-summary">
            <h3>סיכום הזמנה</h3>
            <div class="summary-row">
                <span>סה״כ לפני מע״מ:</span>
                <span id="subtotal">₪900.00</span>
            </div>
            <div class="summary-row">
                <span>הנחת לקוח (5%):</span>
                <span style="color: var(--danger);">- ₪45.00</span>
            </div>
            <div class="summary-row">
                <span>מע״מ (17%):</span>
                <span id="tax">₪145.35</span>
            </div>
            <div class="summary-total">
                <span>סה״כ לתשלום:</span>
                <span id="finalTotal">₪1,000.35</span>
            </div>

            <button class="checkout-btn" onclick="sendOrder()">
                <span>שדר הזמנה ל-SAP</span>
                <i class="fas fa-paper-plane"></i>
            </button>
            
            <a href="#" class="back-link">המשך בקנייה</a>
        </div>

    </div>

    <script>
        function updateQty(btn, change) {
            const input = btn.parentNode.querySelector('.qty-input');
            let val = parseInt(input.value) + change;
            if (val < 1) val = 1;
            input.value = val;
            // כאן תבוא לוגיקה לעדכון המחירים מול ה-API של SAP
        }

        async function sendOrder() {
            const btn = document.querySelector('.checkout-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> מעבד הזמנה ב-SAP...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // סימולציה של שליחת הזמנה (Sales Order) ל-Service Layer
            setTimeout(() => {
                alert("ההזמנה נקלטה בהצלחה במערכת SAP! מספר הזמנה: 100452");
                btn.innerHTML = '<span>הזמנה נשלחה!</span> <i class="fas fa-check"></i>';
                btn.style.background = '#107c10';
            }, 2000);
        }
    </script>
</body>
</html>
