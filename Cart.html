<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סל קניות - SAP B2B</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sap-blue: #0054a6;
            --sap-dark: #003366;
            --sap-light: #f4f7fa;
            --white: #ffffff;
            --border: #e2e8f0;
            --danger: #e74c3c;
        }

        body { margin: 0; font-family: 'Assistant', sans-serif; background-color: var(--sap-light); }

        /* שורת ניווט משותפת */
        .sap-nav {
            background: var(--sap-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; font-size: 14px; }
        .nav-logo { font-weight: bold; font-size: 18px; }

        .cart-container {
            max-width: 1100px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            padding: 0 20px;
        }

        .cart-items-section {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .cart-table { width: 100%; border-collapse: collapse; }
        .cart-table th { text-align: right; color: #718096; padding: 10px; border-bottom: 2px solid var(--sap-light); }
        .cart-item td { padding: 15px 10px; border-bottom: 1px solid var(--border); }

        .qty-control { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 6px; width: fit-content; }
        .qty-btn { background: none; border: none; padding: 5px 10px; cursor: pointer; color: var(--sap-blue); font-weight: bold; }
        .qty-input { width: 35px; border: none; text-align: center; background: transparent; }

        .order-summary {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .summary-total { border-top: 2px solid var(--sap-light); padding-top: 15px; margin-top: 15px; font-weight: bold; font-size: 20px; color: var(--sap-blue); }

        .checkout-btn {
            width: 100%;
            background: var(--sap-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .checkout-btn:disabled { background: #cbd5e0; cursor: not-allowed; }
    </style>
</head>
<body>

    <nav class="sap-nav">
        <div class="nav-logo">SAP Business Portal</div>
        <ul class="nav-links">
            <li><a href="Product Catalog.html">קטלוג</a></li>
            <li><a href="Quick Order.html">הזמנה מהירה</a></li>
            <li><a href="Cart.html" style="border-bottom: 2px solid white;">סל קניות</a></li>
            <li><a href="Order History.html">היסטוריה</a></li>
            <li><a href="Account Info.html">מצב חשבון</a></li>
            <li><a href="login.html" style="color: #ffb3b3;">יציאה</a></li>
        </ul>
    </nav>

    <div class="cart-container">
        <div class="cart-items-section">
            <h2><i class="fas fa-shopping-basket"></i> סל הקניות שלי</h2>
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>מוצר</th>
                        <th>כמות</th>
                        <th>מחיר</th>
                        <th>סה"כ</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cartTableBody">
                    </tbody>
            </table>
        </div>

        <div class="order-summary">
            <h3>סיכום הזמנה</h3>
            <div id="summaryDetails">
                <div class="summary-row"><span>סה"כ שורות:</span> <span id="subtotal">₪0.00</span></div>
                <div class="summary-row"><span>מע"מ (17%):</span> <span id="tax">₪0.00</span></div>
                <div class="summary-total"><span>לתשלום:</span> <span id="finalTotal">₪0.00</span></div>
            </div>
            <button class="checkout-btn" id="submitOrderBtn" onclick="sendOrderToSAP()">שדר הזמנה ל-SAP</button>
            <a href="Product Catalog.html" style="display:block; text-align:center; margin-top:15px; color:#718096; text-decoration:none;">המשך בקנייה</a>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('sap_cart')) || [];

        function renderCart() {
            const tableBody = document.getElementById('cartTableBody');
            tableBody.innerHTML = '';
            let subtotal = 0;

            if (cart.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px;">הסל שלך ריק</td></tr>';
                document.getElementById('submitOrderBtn').disabled = true;
            }

            cart.forEach((item, index) => {
                const rowTotal = item.price * item.qty;
                subtotal += rowTotal;
                tableBody.innerHTML += `
                    <tr>
                        <td>
                            <b>${item.name}</b><br>
                            <small style="color:#a0aec0">מק"ט: ${item.code}</small>
                        </td>
                        <td>
                            <div class="qty-control">
                                <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                                <input type="text" class="qty-input" value="${item.qty}" readonly>
                                <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            </div>
                        </td>
                        <td>₪${item.price.toLocaleString()}</td>
                        <td><b>₪${rowTotal.toLocaleString()}</b></td>
                        <td><i class="fas fa-trash-alt" style="color:#e74c3c; cursor:pointer;" onclick="removeItem(${index})"></i></td>
                    </tr>
                `;
            });

            updateSummary(subtotal);
        }

        function updateQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty < 1) cart[index].qty = 1;
            saveAndRefresh();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('sap_cart', JSON.stringify(cart));
            renderCart();
        }

        function updateSummary(subtotal) {
            const tax = subtotal * 0.17;
            document.getElementById('subtotal').innerText = `₪${subtotal.toLocaleString()}`;
            document.getElementById('tax').innerText = `₪${tax.toLocaleString()}`;
            document.getElementById('finalTotal').innerText = `₪${(subtotal + tax).toLocaleString()}`;
        }

        async function sendOrderToSAP() {
            const btn = document.getElementById('submitOrderBtn');
            const cardCode = sessionStorage.getItem('loggedClientCode') || 'C1000';
            
            // בניית אובייקט עבור ה-Service Layer
            const sapOrder = {
                CardCode: cardCode,
                DocDueDate: new Date().toISOString().split('T')[0], // תאריך של היום
                DocumentLines: cart.map(item => ({
                    ItemCode: item.code,
                    Quantity: item.qty
                }))
            };

            btn.disabled = true;
            btn.innerText = 'מתקשר עם השרת...';

            try {
                const response = await fetch('https://your-proxy.onrender.com/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(sapOrder)
                });

                const result = await response.json();
                if (result.success) {
                    alert(`הזמנה מס' ${result.docEntry} נוצרה בהצלחה בסאפ!`);
                    localStorage.removeItem('sap_cart');
                    window.location.href = 'Order History.html';
                } else {
                    alert('שגיאה ביצירת הזמנה: ' + result.error);
                    btn.disabled = false;
                    btn.innerText = 'שדר הזמנה ל-SAP';
                }
            } catch (err) {
                alert('שגיאת תקשורת עם הפרוקסי');
                btn.disabled = false;
            }
        }

        window.onload = renderCart;
    </script>
</body>
</html>
