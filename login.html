<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הזמנות SAP - השומר</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sap-blue: #0054a6;
            --sap-dark: #003366;
            --sap-light: #f4f7fa;
            --white: #ffffff;
            --error: #d93025;
        }

        body {
            margin: 0;
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, var(--sap-blue) 0%, var(--sap-dark) 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: var(--white);
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-header i { font-size: 4rem; color: var(--sap-blue); margin-bottom: 15px; }
        .login-header h1 { margin: 0; color: var(--sap-dark); font-size: 28px; }
        .login-header p { color: #666; margin-bottom: 35px; }

        .input-wrapper { text-align: right; margin-bottom: 20px; }
        .input-wrapper label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--sap-dark); }
        
        .input-field { position: relative; }
        .input-field i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--sap-blue); }
        .input-field input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .input-field input:focus { border-color: var(--sap-blue); outline: none; }

        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--sap-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .error-msg {
            background: #fdecea;
            color: var(--error);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-shield-halved"></i>
            <h1>השומר</h1>
            <p>פורטל הזמנות SAP Business One</p>
        </div>

        <div id="loginError" class="error-msg"></div>

        <form id="loginForm">
            <div class="input-wrapper">
                <label>מזהה לקוח (CardCode)</label>
                <div class="input-field">
                    <i class="fas fa-user-tag"></i>
                    <input type="text" id="bpCode" placeholder="למשל: C1000" required>
                </div>
            </div>

            <div class="input-wrapper">
                <label>סיסמה</label>
                <div class="input-field">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="הכנס סיסמה" required>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">כניסה למערכת</button>
        </form>
    </div>

    <script>
        const PROXY_URL = "https://your-proxy.onrender.com/api"; // כתובת השרת שלך

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const bpCode = document.getElementById('bpCode').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            // איפוס שגיאות ואפקט טעינה
            errorDiv.style.display = 'none';
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> מאמת מול סאפ...';
            btn.disabled = true;

            try {
                // שליחת בקשת Login לשרת הפרוקסי
                const response = await fetch(`${PROXY_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bpCode, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // שמירת פרטי המשתמש וטוקן ה-Session
                    sessionStorage.setItem('sap_session', data.SessionId);
                    sessionStorage.setItem('loggedCardCode', bpCode);
                    sessionStorage.setItem('loggedCardName', data.CardName);
                    
                    // מעבר לקטלוג
                    window.location.href = "Product Catalog.html";
                } else {
                    throw new Error(data.message || 'פרטי התחברות שגויים');
                }
            } catch (error) {
                errorDiv.innerText = error.message;
                errorDiv.style.display = 'block';
                btn.innerHTML = 'כניסה למערכת';
                btn.disabled = false;
            }
        });

        // בדיקה אם המשתמש כבר מחובר
        window.onload = () => {
            if (sessionStorage.getItem('sap_session')) {
                window.location.href = "Product Catalog.html";
            }
        };
    </script>
</body>
</html>
